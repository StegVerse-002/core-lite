name: repo-recovery-finalize-one-execution-preflight

"on":
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/repo-recovery-finalize-one-execution-preflight.yml"
      - "tools/scripts/repo_recovery_finalize_one_execution_preflight.py"
      - "docs/recovery/SV002_M14_FINALIZE_ONE_EXECUTION_AUTHORITY_DESIGN.md"
      - "docs/recovery/SV002_M11_TO_M13_NON_EXECUTION_BOUNDARY.md"
      - "docs/recovery/SV002_M11_TO_M13_ACTIVATION_SUMMARY.md"
      - "docs/recovery/SV002_M11_TO_M13_RECOVERY_FINALIZATION_PROOF_MAP.md"
      - "reports/current/repo_recovery_destination_plan.json"
      - "reports/current/repo_recovery_finalize_check.json"
      - "reports/current/repo_recovery_finalize_one_candidate.json"
      - "reports/current/recovery_authority_boundary_regression.json"
      - "receipts/current/repo_recovery_destination_plan_receipt.jsonl"
      - "receipts/current/repo_recovery_finalize_check_receipt.jsonl"
      - "receipts/current/repo_recovery_finalize_one_candidate_receipt.jsonl"
      - "receipts/current/recovery_authority_boundary_regression_receipt.jsonl"

permissions:
  contents: write

jobs:
  finalize-one-execution-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run SV002-M14 finalize-one execution preflight
        run: |
          set -euo pipefail
          python tools/scripts/repo_recovery_finalize_one_execution_preflight.py --repo-root .

      - name: Commit SV002-M14 preflight evidence
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 M14 Execution Preflight"
          git config user.email "sv002-m14-execution-preflight@stegverse"
          git add -A reports/current/repo_recovery_finalize_one_execution_preflight.json receipts/current/repo_recovery_finalize_one_execution_preflight_receipt.jsonl || true
          if git diff --staged --quiet; then
            echo "No M14 execution preflight evidence changes to commit."
          else
            git commit -m "sv002: record M14 finalize-one execution preflight"
            git push
          fi

      - name: Upload SV002-M14 preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sv002-m14-finalize-one-execution-preflight-evidence
          path: |
            reports/current/repo_recovery_finalize_one_execution_preflight.json
            receipts/current/repo_recovery_finalize_one_execution_preflight_receipt.jsonl
