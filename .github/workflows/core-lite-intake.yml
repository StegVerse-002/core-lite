name: core-lite-intake

"on":
  workflow_dispatch:
    inputs:
      task_id:
        description: "Task ID (optional override)"
        required: false
        default: ""
      input_type:
        description: "Input type override: bundle/text/document/structured_data/etc."
        required: false
        default: ""
      input_path:
        description: "Input path override"
        required: false
        default: ""
      kv_packet:
        description: "KnowledgeVault context packet path"
        required: false
        default: ""
      stage_override:
        description: "Override active stage"
        required: false
        default: ""
      repair_target:
        description: "Repair target repo"
        required: false
        default: ""
      dry_run:
        description: "Dry run only — no mutations"
        required: false
        default: "false"
      agent_provider:
        description: "none/openai/claude/both"
        required: false
        default: "both"

  push:
    branches: [main]
    paths:
      - "incoming/**"
      - "task.md"
      - "CLAUDE.md"
      - ".github/workflows/core-lite-intake.yml"
      - "scripts/openai_task.py"
      - "scripts/merge_outputs.py"
      - "scripts/package_transition_bundle.py"
      - "scripts/ingest_transition_bundle.py"
      - "tools/agent_governance/**"
      - "agent_policy/**"
      - "governance/directives/**"
      - "schemas/**"
      - "docs/methodology/**"
      - "tools/tasks/**"
      - "core_lite/**"
      - "config/**"
      - "tests/**"

permissions:
  contents: write
  actions: read

concurrency:
  group: core-lite-intake-${{ github.ref }}
  cancel-in-progress: false

env:
  STEGVERSE_ENTITY: StegVerse-002
  STEGVERSE_REPO: StegVerse-002/core-lite
  STEGVERSE_VERSION: 1.0.1-sv002-output-authority
  GOVERNED_LLM_LLM_VERSION: 0.1.3-gllm
  OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}

jobs:
  route:
    runs-on: ubuntu-latest
    outputs:
      route: ${{ steps.route.outputs.route }}
      agent_provider: ${{ steps.route.outputs.agent_provider }}
      stage: ${{ steps.route.outputs.stage }}
      dry_run: ${{ steps.route.outputs.dry_run }}
      input_type: ${{ steps.route.outputs.input_type }}
      input_path: ${{ steps.route.outputs.input_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve autonomous route
        id: route
        run: |
          set -euo pipefail
          mkdir -p reports/current

          EVENT="${{ github.event_name }}"
          ROUTE="noop"
          AGENT_PROVIDER="none"
          INPUT_TYPE="${{ github.event.inputs.input_type || '' }}"
          INPUT_PATH="${{ github.event.inputs.input_path || '' }}"
          STAGE="${{ github.event.inputs.stage_override || '' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          if [ -z "${STAGE}" ]; then STAGE="SV002-M11"; fi
          if [ -z "${DRY_RUN}" ]; then DRY_RUN="false"; fi

          : > reports/current/changed_files.txt
          if [ "${EVENT}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
              git diff --name-only "${BEFORE}" "${AFTER}" | sort > reports/current/changed_files.txt || true
            else
              git diff-tree --no-commit-id --name-only -r "${AFTER}" | sort > reports/current/changed_files.txt || true
            fi

            if grep -q '^incoming/' reports/current/changed_files.txt; then
              ROUTE="incoming"
              AGENT_PROVIDER="none"
              INPUT_TYPE="push_incoming_disposition_gate"
              INPUT_PATH="@reports/current/incoming_changed_files.txt"
            elif grep -Eq '^(task.md|CLAUDE.md|\.github/workflows/core-lite-intake.yml|scripts/|tools/agent_governance/|agent_policy/|governance/directives/|schemas/|docs/methodology/|tools/tasks/|core_lite/|config/|tests/)' reports/current/changed_files.txt; then
              ROUTE="llm_bundle_and_ingest"
              AGENT_PROVIDER="both"
            else
              ROUTE="noop"
            fi
          else
            if [ "${{ github.event.inputs.agent_provider || 'both' }}" != "none" ]; then
              ROUTE="llm_bundle_and_ingest"
              AGENT_PROVIDER="${{ github.event.inputs.agent_provider || 'both' }}"
            elif [ -n "${INPUT_TYPE}" ] || [ -n "${INPUT_PATH}" ]; then
              ROUTE="incoming"
              AGENT_PROVIDER="none"
            elif [ -n "${{ github.event.inputs.task_id || '' }}" ]; then
              ROUTE="declared_task"
              AGENT_PROVIDER="none"
            fi
          fi

          echo "route=${ROUTE}" >> "$GITHUB_OUTPUT"
          echo "agent_provider=${AGENT_PROVIDER}" >> "$GITHUB_OUTPUT"
          echo "stage=${STAGE}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "input_type=${INPUT_TYPE}" >> "$GITHUB_OUTPUT"
          echo "input_path=${INPUT_PATH}" >> "$GITHUB_OUTPUT"

          {
            echo "## StegVerse Core-Lite Intake — Autonomous Route"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| event | ${EVENT} |"
            echo "| route | ${ROUTE} |"
            echo "| agent_provider | ${AGENT_PROVIDER} |"
            echo "| stage | ${STAGE} |"
            echo "| dry_run | ${DRY_RUN} |"
            echo
            echo "### Changed files"
            if [ -s reports/current/changed_files.txt ]; then sed 's/^/- /' reports/current/changed_files.txt; else echo "- none"; fi
          } >> "$GITHUB_STEP_SUMMARY"

  incoming-ingest:
    runs-on: ubuntu-latest
    needs: [route]
    if: ${{ needs.route.outputs.route == 'incoming' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install -e . || true
          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Resolve incoming payloads
        run: |
          set -euo pipefail
          mkdir -p reports/current receipts/current tracking/incoming_mailbox quarantine/incoming dist/run_artifacts
          : > reports/current/incoming_changed_files.txt
          : > reports/current/incoming_disposition_summary.jsonl
          : > receipts/current/incoming_disposition_receipt.jsonl
          : > reports/current/incoming_disposition_processed_files.txt

          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
              git diff --name-only "${BEFORE}" "${AFTER}" -- incoming/ | sort | while read -r f; do
                [ -f "${f}" ] && [ "${f}" != "incoming/README.md" ] && echo "${f}" || true
              done > reports/current/incoming_changed_files.txt
            else
              git diff-tree --no-commit-id --name-only -r "${AFTER}" -- incoming/ | sort | while read -r f; do
                [ -f "${f}" ] && [ "${f}" != "incoming/README.md" ] && echo "${f}" || true
              done > reports/current/incoming_changed_files.txt
            fi
          else
            if [ -n "${{ github.event.inputs.input_path || '' }}" ] && [ -f "${{ github.event.inputs.input_path || '' }}" ]; then
              echo "${{ github.event.inputs.input_path }}" > reports/current/incoming_changed_files.txt
            fi
          fi

      - name: Process incoming payloads
        run: |
          set -euo pipefail
          STAGE="${{ needs.route.outputs.stage }}"
          DRY_RUN_ARG=""
          if [ "${{ needs.route.outputs.dry_run }}" = "true" ]; then DRY_RUN_ARG="--dry-run"; fi

          if [ ! -s reports/current/incoming_changed_files.txt ]; then
            echo "No incoming payloads selected."
            exit 0
          fi

          RUN_FAILED=0
          while IFS= read -r INPUT_PATH; do
            [ -n "${INPUT_PATH}" ] || continue
            [ -f "${INPUT_PATH}" ] || continue
            SHA="$(sha256sum "${INPUT_PATH}" | awk '{print $1}')"
            SHORT_SHA="$(printf "%s" "${SHA}" | cut -c1-16)"
            BASE="$(basename "${INPUT_PATH}")"
            EVENT_DIR="tracking/incoming_mailbox/${SHORT_SHA}"
            STAGED_PAYLOAD="${EVENT_DIR}/${BASE}"
            mkdir -p "${EVENT_DIR}"
            cp "${INPUT_PATH}" "${STAGED_PAYLOAD}"

            STATUS="EVALUATED"
            DISPOSITION="UNKNOWN"
            REASON=""
            EXIT_CODE=0

            set +e
            if [ "${INPUT_PATH##*.}" = "zip" ]; then
              python scripts/ingest_transition_bundle.py "${STAGED_PAYLOAD}" --repo-root . > "${EVENT_DIR}/ingest_transition_bundle.log" 2>&1
              EXIT_CODE=$?
            else
              case "${INPUT_PATH}" in
                *.json|*.jsonl|*.yml|*.yaml) INFERRED_TYPE="structured_data" ;;
                *.md|*.txt) INFERRED_TYPE="document" ;;
                *) INFERRED_TYPE="document" ;;
              esac
              python -m core_lite.multimodal.pipeline \
                --repo-root . \
                --input-type "${INFERRED_TYPE}" \
                --input-path "${STAGED_PAYLOAD}" \
                --entity "${STEGVERSE_ENTITY}" \
                --stage "${STAGE}" \
                ${DRY_RUN_ARG} > "${EVENT_DIR}/pipeline.log" 2>&1
              EXIT_CODE=$?
            fi
            set -e

            if [ "${EXIT_CODE}" -eq 0 ]; then
              DISPOSITION="ADMITTED_OR_ACCEPTED"
              REASON="payload evaluated successfully"
            else
              DISPOSITION="QUARANTINED"
              REASON="payload evaluation exited ${EXIT_CODE}"
              mkdir -p "quarantine/incoming/${SHORT_SHA}"
              cp "${STAGED_PAYLOAD}" "quarantine/incoming/${SHORT_SHA}/${BASE}" || true
              RUN_FAILED=1
            fi

            export INPUT_PATH STAGED_PAYLOAD SHA STATUS DISPOSITION REASON EXIT_CODE STAGE
            python3 - <<'PY' >> reports/current/incoming_disposition_summary.jsonl
import datetime, json, os
print(json.dumps({
  "schema": "stegverse.incoming_disposition.v1",
  "timestamp_utc": datetime.datetime.now(datetime.timezone.utc).isoformat(),
  "stage": os.environ.get("STAGE", ""),
  "source_path": os.environ["INPUT_PATH"],
  "staged_payload": os.environ["STAGED_PAYLOAD"],
  "sha256": os.environ["SHA"],
  "status": os.environ["STATUS"],
  "disposition": os.environ["DISPOSITION"],
  "reason": os.environ["REASON"],
  "pipeline_exit_code": int(os.environ.get("EXIT_CODE", "0") or "0")
}, sort_keys=True))
PY
            tail -n 1 reports/current/incoming_disposition_summary.jsonl >> receipts/current/incoming_disposition_receipt.jsonl
            echo "${INPUT_PATH}" >> reports/current/incoming_disposition_processed_files.txt
          done < reports/current/incoming_changed_files.txt

          echo "${RUN_FAILED}" > reports/current/incoming_disposition_exit_code.txt
          exit 0

      - name: Cleanup dispositioned incoming payloads
        if: always()
        run: |
          set -euo pipefail
          mkdir -p incoming reports/current
          if [ ! -f incoming/README.md ]; then
            printf '# Incoming\n\nEphemeral ingestion mailbox. Payloads pushed here are evaluated, receipted, and removed only after disposition.\n' > incoming/README.md
          fi
          if [ -s reports/current/incoming_disposition_processed_files.txt ]; then
            while IFS= read -r path; do
              [ -n "${path}" ] || continue
              [ "${path}" != "incoming/README.md" ] || continue
              git rm -f --ignore-unmatch "${path}" || rm -f "${path}" || true
            done < reports/current/incoming_disposition_processed_files.txt
          fi

      - name: Commit incoming ingestion evidence
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 Incoming Ingestion Router"
          git config user.email "sv002-incoming-ingestion-router@stegverse"
          git add -A incoming/ reports/current/ receipts/current/ tracking/ quarantine/ dist/ || true
          if git diff --staged --quiet; then
            echo "No incoming ingestion changes to commit."
          else
            git commit -m "sv002: autonomously process incoming ingestion payloads"
            git push
          fi

      - name: Upload incoming ingestion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incoming-ingestion-evidence
          path: |
            reports/current/
            receipts/current/
            tracking/
            quarantine/
            dist/
          if-no-files-found: warn

  claude-agent:
    runs-on: ubuntu-latest
    needs: [route]
    if: ${{ needs.route.outputs.route == 'llm_bundle_and_ingest' && (needs.route.outputs.agent_provider == 'claude' || needs.route.outputs.agent_provider == 'both') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Claude Code propose-only task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p outputs reports/current receipts/current
          if [ ! -f task.md ]; then
            printf '# Claude Code — Skipped\n\nNo task.md was present. No Claude proposal was generated.\n' > outputs/claude_response.md
            exit 0
          fi
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            printf '# Claude Code — Skipped\n\nANTHROPIC_API_KEY is not configured. Claude proposal was not generated.\n' > outputs/claude_response.md
            exit 0
          fi
          npm install -g @anthropic-ai/claude-code
          {
            echo "# Claude Code — Governed Collaboration Proposal"
            echo
            echo "Run timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "Governance mode: propose-only"
            echo
            echo "Capability version: ${GOVERNED_LLM_LLM_VERSION}"
            echo
            echo "Task source: task.md"
            echo
            echo "Directive: no broad authority is ever admissible under Transition Table, AE, or GCAT/BCAT enforcement."
            echo
            echo "---"
            echo
          } > outputs/claude_response.md
          claude -p "$(cat task.md)" >> outputs/claude_response.md 2>&1 || true
          python3 - <<'PY' > reports/current/claude_task_summary.json
import json, os
print(json.dumps({"schema":"stegverse.claude_task_summary.v1","version":os.environ["GOVERNED_LLM_LLM_VERSION"],"provider":"claude","status":"completed","mode":"propose_only","output_path":"outputs/claude_response.md","authority":"candidate_evidence_only"}, indent=2))
PY
      - name: Upload Claude output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-response
          path: |
            outputs/claude_response.md
            reports/current/claude_task_summary.json
          if-no-files-found: warn

  openai-agent:
    runs-on: ubuntu-latest
    needs: [route]
    if: ${{ needs.route.outputs.route == 'llm_bundle_and_ingest' && (needs.route.outputs.agent_provider == 'openai' || needs.route.outputs.agent_provider == 'both') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run OpenAI propose-only task
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p outputs reports/current receipts/current
          python scripts/openai_task.py
      - name: Upload OpenAI output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-response
          path: |
            outputs/chatgpt_response.md
            reports/current/openai_task_summary.json
            receipts/current/openai_task_receipt.jsonl
          if-no-files-found: warn

  merge-package-ingest:
    runs-on: ubuntu-latest
    needs: [route, claude-agent, openai-agent]
    if: ${{ always() && needs.route.outputs.route == 'llm_bundle_and_ingest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Claude output
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: claude-response
          path: .

      - name: Download OpenAI output
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: openai-response
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install -e . || true
          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Run deterministic synthesis
        run: |
          set -euo pipefail
          mkdir -p outputs reports/current receipts/current agent_history dist/bundles
          python scripts/merge_outputs.py

      - name: Compare agent outputs
        run: |
          python tools/agent_governance/agent_compare.py --fail-on-high

      - name: Enforce coordination boundary
        run: |
          python tools/agent_governance/enforce_agent_boundary.py \
            --allowed agent_policy/allowed_paths.json \
            --forbidden agent_policy/forbidden_paths.json \
            --report reports/current/agent_boundary_report.json \
            --receipt receipts/current/agent_boundary_receipt.jsonl

      - name: Record LLM-LLM coordination change
        run: |
          python tools/agent_governance/record_llm_change.py \
            --provider coordinator \
            --conversation current-workflow-run \
            --version "${GOVERNED_LLM_LLM_VERSION}" \
            --change-type coordination_run \
            --summary "Recorded autonomous governed LLM-LLM collaboration, proposed-transition packaging, and ingestion verification." \
            --files outputs/thread.md reports/current/agent_coordination_report.json reports/current/agent_comparison_report.json reports/current/agent_boundary_report.json receipts/current/agent_coordination_receipt.jsonl receipts/current/agent_comparison_receipt.jsonl receipts/current/agent_boundary_receipt.jsonl

      - name: Package proposed-transition bundle
        run: |
          python scripts/package_transition_bundle.py

      - name: Ingest packaged transition bundle as candidate evidence
        run: |
          python scripts/ingest_transition_bundle.py dist/bundles/proposed_transition_bundle.zip --repo-root .

      - name: Commit autonomous proof artifacts
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 Autonomous Coordinator"
          git config user.email "sv002-autonomous-coordinator@stegverse"
          git add -A \
            outputs/ \
            reports/current/ \
            receipts/current/ \
            agent_history/ \
            dist/ \
            tracking/ \
            quarantine/ \
            failed_bundles/ \
            repair/ || true
          if git diff --staged --quiet; then
            echo "No autonomous proof artifacts to commit."
          else
            git commit -m "sv002: autonomous transition bundle package and ingest proof"
            git push
          fi

      - name: Upload autonomous proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-transition-bundle-proof
          path: |
            outputs/
            reports/current/
            receipts/current/
            agent_history/
            dist/
            tracking/
            quarantine/
            failed_bundles/
            repair/
          if-no-files-found: warn
