name: core-lite-intake

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Task ID (leave blank for default intake run)"
        required: false
        default: ""
      skip_tasks:
        description: "Skip declared task loop (true/false)"
        required: false
        default: "true"
      stage_override:
        description: "Override active stage (leave blank for current)"
        required: false
        default: ""
      repair_target:
        description: "Repair target repo (e.g. Data-Continuation/core-lite)"
        required: false
        default: ""
      input_type:
        description: "Multimodal input type (text/voice/image/screenshot/document/structured_data/llm_output/bundle)"
        required: false
        default: ""
      input_path:
        description: "Path to input file or manifest (relative to repo root)"
        required: false
        default: ""
      kv_packet:
        description: "KnowledgeVault context packet path"
        required: false
        default: ""
      dry_run:
        description: "Dry run only — no mutations (true/false)"
        required: false
        default: "false"
      agent_provider:
        description: "Governed LLM collaboration provider for task.md: none/openai/claude/both"
        required: false
        default: "none"

  push:
    branches: [main]
    paths:
      - "task.md"
      - "CLAUDE.md"
      - "scripts/openai_task.py"
      - "scripts/merge_outputs.py"
      - "agent_policy/**"
      - "agent_history/**"
      - "governance/directives/**"
      - "schemas/**"
      - "tools/agent_governance/**"
      - "tools/tasks/**"
      - "core_lite/**"
      - "config/**"

permissions:
  contents: write
  actions: read

env:
  STEGVERSE_ENTITY: StegVerse-002
  STEGVERSE_REPO: StegVerse-002/core-lite
  STEGVERSE_VERSION: 1.0.0-sv002-m10
  GOVERNED_LLM_LLM_VERSION: 0.1.2-gllm
  OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
  AGENT_PROVIDER: ${{ github.event_name == 'push' && 'both' || inputs.agent_provider }}

jobs:

  # ── JOB A: CLAUDE CODE PROPOSAL AGENT ────────────────────────────────────
  claude-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Claude Code propose-only task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p outputs reports/current receipts/current

          if [ ! -f task.md ]; then
            cat > outputs/claude_response.md <<'EOF'
          # Claude Code — Skipped

          No task.md was present. No Claude proposal was generated.
          EOF
            exit 0
          fi

          if [ "${AGENT_PROVIDER}" != "claude" ] && [ "${AGENT_PROVIDER}" != "both" ]; then
            cat > outputs/claude_response.md <<EOF
          # Claude Code — Skipped

          AGENT_PROVIDER=${AGENT_PROVIDER}; Claude was not selected for this run.
          EOF
            exit 0
          fi

          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            cat > outputs/claude_response.md <<'EOF'
          # Claude Code — Skipped

          ANTHROPIC_API_KEY is not configured. Claude proposal was not generated.
          EOF
            exit 0
          fi

          npm install -g @anthropic-ai/claude-code

          {
            echo "# Claude Code — Governed Collaboration Proposal"
            echo
            echo "Run timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "Governance mode: propose-only"
            echo
            echo "Capability version: ${GOVERNED_LLM_LLM_VERSION}"
            echo
            echo "Task source: task.md"
            echo
            echo "Directive: no broad authority is ever admissible under Transition Table, AE, or GCAT/BCAT enforcement."
            echo
            echo "---"
            echo
          } > outputs/claude_response.md

          claude -p \
            --dangerously-skip-permissions \
            "$(cat task.md)" >> outputs/claude_response.md 2>&1 || true

          cat > reports/current/claude_task_summary.json <<JSON
          {
            "schema": "stegverse.claude_task_summary.v1",
            "version": "${GOVERNED_LLM_LLM_VERSION}",
            "provider": "claude",
            "status": "completed",
            "mode": "propose_only",
            "output_path": "outputs/claude_response.md",
            "authority": "candidate_evidence_only"
          }
          JSON

      - name: Upload Claude output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-response
          path: |
            outputs/claude_response.md
            reports/current/claude_task_summary.json
          if-no-files-found: warn

  # ── JOB B: OPENAI PROPOSAL AGENT ─────────────────────────────────────────
  openai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run OpenAI propose-only task
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p outputs reports/current receipts/current
          python scripts/openai_task.py

      - name: Upload OpenAI output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-response
          path: |
            outputs/chatgpt_response.md
            reports/current/openai_task_summary.json
            receipts/current/openai_task_receipt.jsonl
          if-no-files-found: warn

  # ── JOB C: MERGE + GOVERNED SYNTHESIS ────────────────────────────────────
  merge-and-commit:
    runs-on: ubuntu-latest
    needs: [claude-agent, openai-agent]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Claude output
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: claude-response
          path: outputs/

      - name: Download OpenAI output
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: openai-response
          path: outputs/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deterministic synthesis
        run: |
          mkdir -p outputs reports/current receipts/current agent_history
          python scripts/merge_outputs.py

      - name: Compare agent outputs
        run: |
          python tools/agent_governance/agent_compare.py --fail-on-high

      - name: Enforce coordination boundary
        run: |
          python tools/agent_governance/enforce_agent_boundary.py \
            --allowed agent_policy/allowed_paths.json \
            --forbidden agent_policy/forbidden_paths.json \
            --report reports/current/agent_boundary_report.json \
            --receipt receipts/current/agent_boundary_receipt.jsonl

      - name: Record LLM-LLM coordination change
        run: |
          python tools/agent_governance/record_llm_change.py \
            --provider coordinator \
            --conversation current-workflow-run \
            --version "${GOVERNED_LLM_LLM_VERSION}" \
            --change-type coordination_run \
            --summary "Recorded governed LLM-LLM collaboration outputs, comparison evidence, no-broad-authority directive, and boundary enforcement." \
            --files outputs/thread.md reports/current/agent_coordination_report.json reports/current/agent_comparison_report.json reports/current/agent_boundary_report.json receipts/current/agent_coordination_receipt.jsonl receipts/current/agent_comparison_receipt.jsonl receipts/current/agent_boundary_receipt.jsonl

      - name: Commit governed coordination outputs
        run: |
          git config user.name "StegVerse-002 Agent Coordinator"
          git config user.email "sv002-agent-coordinator@stegverse"

          git add -A \
            outputs/ \
            reports/current/ \
            receipts/current/ \
            agent_history/ || true

          git diff --staged --quiet || git commit -m "sv002: governed collaboration v0.1.2 — $(head -1 task.md 2>/dev/null || echo no-task)"
          git push || true

      - name: Upload coordination artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governed-llm-llm-collaboration
          path: |
            outputs/
            reports/current/
            receipts/current/
            agent_history/
          if-no-files-found: warn

  # ── JOB D: CORE DISPATCHER ───────────────────────────────────────────────
  dispatch:
    runs-on: ubuntu-latest
    needs: [merge-and-commit]
    if: always()
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull coordination commit if present
        run: |
          git pull --ff-only || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . || true
          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Resolve active stage and gate
        id: stage
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE python -m tools.scripts.resolve_stage \
            --stage-override "${{ github.event.inputs.stage_override }}" \
            --state-file tracking/stegverse-002/stage_map.json \
            --output-env $GITHUB_OUTPUT

      - name: Run Core-Lite Intake
        if: ${{ github.event.inputs.task_id == '' || github.event.inputs.task_id == null }}
        run: |
          python -m core_lite.cli run \
            --repo-root . \
            --skip-tasks \
            --entity StegVerse-002 \
            --stage "${{ steps.stage.outputs.active_stage }}"

      - name: Run declared task
        if: ${{ github.event.inputs.task_id != '' && github.event.inputs.task_id != null }}
        run: |
          python -m tools.scripts.task_dispatcher \
            --task-id "${{ github.event.inputs.task_id }}" \
            --task-catalog tools/tasks/task_catalog.json \
            --entity StegVerse-002 \
            --stage "${{ steps.stage.outputs.active_stage }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Process multimodal input
        if: ${{ github.event.inputs.input_type != '' && github.event.inputs.input_type != null }}
        run: |
          python -m core_lite.multimodal.pipeline \
            --input-type "${{ github.event.inputs.input_type }}" \
            --input-path "${{ github.event.inputs.input_path }}" \
            --entity StegVerse-002 \
            --stage "${{ steps.stage.outputs.active_stage }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Process KnowledgeVault context packet
        if: ${{ github.event.inputs.kv_packet != '' && github.event.inputs.kv_packet != null }}
        run: |
          python -m core_lite.knowledgevault.intake \
            --packet-path "${{ github.event.inputs.kv_packet }}" \
            --entity StegVerse-002 \
            --stage "${{ steps.stage.outputs.active_stage }}"

      - name: Run StegVerse-001 repair
        if: ${{ github.event.inputs.repair_target != '' && github.event.inputs.repair_target != null }}
        run: |
          python -m tools.repair.sv001_repair \
            --target-repo "${{ github.event.inputs.repair_target }}" \
            --entity StegVerse-002 \
            --stage SV002-M3 \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Run TV/TVC authority verification
        if: ${{ github.event.inputs.task_id == 'tvc.verify.all' }}
        run: |
          python -m core_lite.tvc.verify \
            --registry config/package_registry.json \
            --entity StegVerse-002

      - name: CGE admissibility check
        continue-on-error: true
        run: |
          python -m core_lite.cge \
            --repo-root . \
            --entity StegVerse-002 \
            --stage "${{ steps.stage.outputs.active_stage }}"

      - name: Emit run receipt
        if: always()
        run: |
          python -m tools.scripts.emit_receipt \
            --actor StegVerse-002 \
            --stage "${{ steps.stage.outputs.active_stage }}" \
            --gate core-lite-intake \
            --task-id "${{ github.event.inputs.task_id }}" \
            --decision "${{ job.status == 'success' && 'ALLOW' || 'FAIL_CLOSED' }}" \
            --basis "Dispatcher run — task_id=${{ github.event.inputs.task_id }} skip_tasks=${{ github.event.inputs.skip_tasks }}" \
            --output receipts/current/intake_receipt.jsonl

      - name: Update stage state
        if: success()
        run: |
          python -m tools.scripts.update_stage_state \
            --state-file tracking/stegverse-002/stage_map.json \
            --stage "${{ steps.stage.outputs.active_stage }}" \
            --status last_run_success

      - name: Commit run evidence
        if: always()
        run: |
          git config user.name "StegVerse-002 Dispatcher"
          git config user.email "sv002-dispatcher@stegverse"

          git add -A \
            reports/ \
            receipts/ \
            tracking/ \
            dist/ \
            repair/ \
            docs/ \
            machine/ \
            schemas/ \
            core_lite/ \
            tools/ \
            tests/ \
            incoming/ \
            failed_bundles/ \
            quarantine/ || true

          git diff --staged --quiet || git commit -m "sv002: intake run — stage=${{ steps.stage.outputs.active_stage }} task=${{ github.event.inputs.task_id }}"
          git push || true

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sv002-intake-run-${{ github.run_number }}
          path: |
            reports/current/
            receipts/current/
            tracking/stegverse-002/
            tracking/ingestion_events/
            dist/current/
            dist/master-records/
            dist/failed_bundles/
            repair/bundles/
            outputs/
            agent_history/
          if-no-files-found: warn
