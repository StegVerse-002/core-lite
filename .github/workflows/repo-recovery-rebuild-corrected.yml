name: repo-recovery-rebuild-corrected

"on":
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "tools/scripts/repo_recovery_wrap.py"
      - ".github/workflows/repo-recovery-rebuild-corrected.yml"

permissions:
  contents: write

jobs:
  rebuild-corrected-recovery-bundles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild corrected recovery bundles outside incoming
        run: |
          set -euo pipefail
          mkdir -p tracking/recovery_corrected reports/current receipts/current
          rm -f tracking/recovery_corrected/*.zip || true
          python tools/scripts/repo_recovery_wrap.py \
            --repo-root . \
            --audit-report reports/current/repo_recovery_audit_report.json \
            --report-dir reports/current \
            --receipt-dir receipts/current \
            --incoming-recovery-dir tracking/recovery_corrected

      - name: Verify corrected manifests include transition blocks
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, zipfile
          from pathlib import Path
          bundles = sorted(Path('tracking/recovery_corrected').glob('*.zip'))
          bad = []
          for bundle in bundles:
              with zipfile.ZipFile(bundle) as z:
                  manifest = json.loads(z.read('bundle_manifest.json'))
              transition = manifest.get('transition', {})
              if transition.get('transition_class') != 'evidence':
                  bad.append(str(bundle))
              if transition.get('authority_class') != 'evidence_only':
                  bad.append(str(bundle))
              if transition.get('binding_level') != 'non_binding':
                  bad.append(str(bundle))
          report = {
              'schema': 'stegverse.repo_recovery.corrected_bundle_validation.v1',
              'bundles_checked': len(bundles),
              'invalid_bundles': sorted(set(bad)),
              'decision': 'ALLOW' if bundles and not bad else 'FAIL_CLOSED',
          }
          Path('reports/current/repo_recovery_corrected_bundle_validation.json').write_text(json.dumps(report, indent=2, sort_keys=True) + '\n')
          print(json.dumps(report, indent=2, sort_keys=True))
          raise SystemExit(0 if report['decision'] == 'ALLOW' else 1)
          PY

      - name: Commit corrected recovery evidence
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 Recovery Rebuilder"
          git config user.email "sv002-recovery-rebuilder@stegverse"
          git add -A tracking/recovery_corrected reports/current receipts/current || true
          if git diff --staged --quiet; then
            echo "No corrected recovery rebuild changes to commit."
          else
            git commit -m "sv002: rebuild corrected recovery evidence bundles"
            git push
          fi

      - name: Upload corrected recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corrected-recovery-bundles
          path: |
            tracking/recovery_corrected/*.zip
            reports/current/repo_recovery_wrap_report.json
            reports/current/repo_recovery_corrected_bundle_validation.json
            receipts/current/repo_recovery_wrap_receipt.jsonl
