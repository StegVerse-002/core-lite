name: repo-recovery-destination-plan

"on":
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/repo-recovery-destination-plan.yml"
      - "tools/scripts/repo_recovery_destination_plan.py"
      - "tracking/recovery_corrected/sv002_recovery_30d45378723de692_CHANGELOG.md.zip"
      - "receipts/current/transition_table_receipt.jsonl"
      - "receipts/current/cge_recovery_proof_regression_receipt.jsonl"

permissions:
  contents: write

jobs:
  plan-one-recovery-destination:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Produce non-executing M12 destination plan
        run: |
          set -euo pipefail
          python tools/scripts/repo_recovery_destination_plan.py --repo-root .

      - name: Commit destination plan evidence
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 M12 Destination Planner"
          git config user.email "sv002-m12-destination-planner@stegverse"
          git add -A reports/current/repo_recovery_destination_plan.json receipts/current/repo_recovery_destination_plan_receipt.jsonl || true
          if git diff --staged --quiet; then
            echo "No M12 destination plan evidence changes to commit."
          else
            git commit -m "sv002: record M12 recovery destination plan"
            git push
          fi

      - name: Upload destination plan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-recovery-destination-plan-evidence
          path: |
            reports/current/repo_recovery_destination_plan.json
            receipts/current/repo_recovery_destination_plan_receipt.jsonl
