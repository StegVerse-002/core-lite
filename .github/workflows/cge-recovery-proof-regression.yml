name: cge-recovery-proof-regression

"on":
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "tools/scripts/verify_cge_recovery_proof.py"
      - "receipts/current/transition_table_receipt.jsonl"
      - "receipts/current/cge_admissibility_receipt.jsonl"
      - "core_lite/cge.py"
      - "core_lite/transition_table/ingest_gate.py"

permissions:
  contents: write

jobs:
  verify-cge-recovery-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify CGE recovery proof did not fall back to ERROR
        run: |
          set -euo pipefail
          python tools/scripts/verify_cge_recovery_proof.py --repo-root .

      - name: Commit regression evidence
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 CGE Regression Guard"
          git config user.email "sv002-cge-regression-guard@stegverse"
          git add -A reports/current/cge_recovery_proof_regression_report.json receipts/current/cge_recovery_proof_regression_receipt.jsonl || true
          if git diff --staged --quiet; then
            echo "No CGE recovery regression evidence changes to commit."
          else
            git commit -m "sv002: record CGE recovery proof regression result"
            git push
          fi

      - name: Upload regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cge-recovery-proof-regression-evidence
          path: |
            reports/current/cge_recovery_proof_regression_report.json
            receipts/current/cge_recovery_proof_regression_receipt.jsonl
