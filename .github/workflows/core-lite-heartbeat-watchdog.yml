name: core-lite-heartbeat-watchdog

"on":
  workflow_dispatch:
  schedule:
    # Independent watchdog path. GitHub schedule timing is approximate.
    - cron: "*/10 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/core-lite-heartbeat-watchdog.yml"
      - ".github/workflows/core-lite-autonomous-tick.yml"
      - "config/heartbeat_policy.json"
      - "scripts/check_scheduler_liveness.py"
      - "scripts/check_transition_bundle_proof.py"
      - "scripts/evaluate_heartbeat_mode.py"
      - "scripts/ingest_transition_bundle.py"
      - "dist/bundles/**"
      - "reports/current/external_scheduler_observation.json"
      - "receipts/current/external_scheduler_observation_receipt.jsonl"

permissions:
  contents: write
  actions: read

concurrency:
  group: core-lite-heartbeat-watchdog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  heartbeat-watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Emit watchdog heartbeat and liveness reports
        id: watchdog
        run: |
          set -euo pipefail
          mkdir -p reports/current receipts/current dist/master-records/pending_candidate_bundles

          python scripts/check_transition_bundle_proof.py --repo-root .
          python scripts/evaluate_heartbeat_mode.py --repo-root .
          python scripts/check_scheduler_liveness.py --repo-root . --max-age-minutes 20

          STATUS="$(python3 -c "import json; print(json.load(open('reports/current/transition_bundle_proof_check.json'))['status'])")"
          SHOULD_REPAIR="$(python3 -c "import json; print(str(json.load(open('reports/current/heartbeat_evaluation.json'))['should_attempt_repair']).lower())")"
          SCHEDULER_STATUS="$(python3 -c "import json; print(json.load(open('reports/current/scheduler_liveness_report.json'))['status'])")"
          MISSING="$(python3 -c "import json; print(', '.join(json.load(open('reports/current/transition_bundle_proof_check.json'))['missing']))")"

          echo "status=${STATUS}" >> "${GITHUB_OUTPUT}"
          echo "should_repair=${SHOULD_REPAIR}" >> "${GITHUB_OUTPUT}"
          echo "scheduler_status=${SCHEDULER_STATUS}" >> "${GITHUB_OUTPUT}"
          echo "missing=${MISSING}" >> "${GITHUB_OUTPUT}"

          {
            echo "## Core-Lite Heartbeat Watchdog"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| proof_status | ${STATUS} |"
            echo "| should_repair | ${SHOULD_REPAIR} |"
            echo "| scheduler_status | ${SCHEDULER_STATUS} |"
            echo "| missing | ${MISSING:-none} |"
            echo
            echo "### Proof check"
            echo
            echo '```json'
            cat reports/current/transition_bundle_proof_check.json
            echo '```'
            echo
            echo "### Heartbeat evaluation"
            echo
            echo '```json'
            cat reports/current/heartbeat_evaluation.json
            echo '```'
            echo
            echo "### Scheduler liveness"
            echo
            echo '```json'
            cat reports/current/scheduler_liveness_report.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Watchdog ingest existing transition bundle if receipt is missing
        if: ${{ steps.watchdog.outputs.should_repair == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p reports/current receipts/current dist/master-records/pending_candidate_bundles
          if [ -f dist/bundles/proposed_transition_bundle.zip ] && [ ! -f receipts/current/transition_bundle_ingest_receipt.jsonl ]; then
            set +e
            python scripts/ingest_transition_bundle.py dist/bundles/proposed_transition_bundle.zip --repo-root . > reports/current/watchdog_transition_bundle_ingest_stdout.json 2> reports/current/watchdog_transition_bundle_ingest_stderr.txt
            INGEST_EXIT=$?
            set -e
            echo "${INGEST_EXIT}" > reports/current/watchdog_transition_bundle_ingest_exit_code.txt
            if [ "${INGEST_EXIT}" -ne 0 ]; then
              echo "::warning::watchdog ingest exited ${INGEST_EXIT}; committing receipt/diagnostics for review."
            fi
          else
            echo "No watchdog ingest attempted. Bundle missing or ingest receipt already present."
          fi

          python scripts/check_transition_bundle_proof.py --repo-root .
          python scripts/evaluate_heartbeat_mode.py --repo-root .
          python scripts/check_scheduler_liveness.py --repo-root . --max-age-minutes 20

      - name: Commit watchdog evidence
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 Heartbeat Watchdog"
          git config user.email "sv002-heartbeat-watchdog@stegverse"
          git add -A \
            reports/current/ \
            receipts/current/ \
            dist/master-records/ \
            quarantine/ \
            failed_bundles/ \
            repair/ || true
          git add -f dist/master-records/ || true
          if git diff --staged --quiet; then
            echo "No watchdog evidence changes to commit."
          else
            git commit -m "sv002: heartbeat watchdog evidence"
            git push
          fi
