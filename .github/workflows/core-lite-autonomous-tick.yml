name: core-lite-autonomous-tick

"on":
  workflow_dispatch:
  schedule:
    # Autonomous activation tick. GitHub schedule timing is approximate.
    - cron: "*/5 * * * *"
  push:
    branches: [main]
    paths:
      - ".gitignore"
      - ".github/workflows/core-lite-autonomous-tick.yml"
      - ".github/workflows/core-lite-intake.yml"
      - "scripts/check_transition_bundle_proof.py"
      - "scripts/package_transition_bundle.py"
      - "scripts/ingest_transition_bundle.py"
      - "task.md"
      - "schemas/transition_bundle.v1.schema.json"
      - "docs/methodology/**"
      - "outputs/**"
      - "reports/current/**"
      - "receipts/current/**"

permissions:
  contents: write
  actions: write

concurrency:
  group: core-lite-autonomous-tick-${{ github.ref }}
  cancel-in-progress: false

jobs:
  autonomous-tick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check transition-bundle proof state
        id: decide
        run: |
          set -euo pipefail
          mkdir -p reports/current receipts/current
          python scripts/check_transition_bundle_proof.py --repo-root .

          NEEDS_PROOF="$(python3 -c "import json; print(str(json.load(open('reports/current/transition_bundle_proof_check.json'))['needs_proof']).lower())")"
          STATUS="$(python3 -c "import json; print(json.load(open('reports/current/transition_bundle_proof_check.json'))['status'])")"
          MISSING="$(python3 -c "import json; print(', '.join(json.load(open('reports/current/transition_bundle_proof_check.json'))['missing']))")"

          echo "needs_proof=${NEEDS_PROOF}" >> "${GITHUB_OUTPUT}"
          echo "status=${STATUS}" >> "${GITHUB_OUTPUT}"
          echo "missing=${MISSING}" >> "${GITHUB_OUTPUT}"

          {
            echo "## Core-Lite Autonomous Tick"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| proof_status | ${STATUS} |"
            echo "| needs_proof | ${NEEDS_PROOF} |"
            echo "| missing | ${MISSING:-none} |"
            echo
            echo "### Proof check report"
            echo
            echo '```json'
            cat reports/current/transition_bundle_proof_check.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Regenerate and ingest missing transition-bundle proof artifacts
        id: regenerate
        if: ${{ steps.decide.outputs.needs_proof == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p outputs reports/current receipts/current agent_history dist/bundles dist/master-records/pending_candidate_bundles

          echo "## Autonomous Proof Regeneration" >> "${GITHUB_STEP_SUMMARY}"
          echo >> "${GITHUB_STEP_SUMMARY}"

          PACKAGE_EXIT=0
          INGEST_EXIT=99

          if [ ! -f outputs/thread.md ]; then
            echo "- outputs/thread.md missing; running deterministic synthesis first." >> "${GITHUB_STEP_SUMMARY}"
            set +e
            python scripts/merge_outputs.py > reports/current/transition_bundle_merge_stdout.txt 2> reports/current/transition_bundle_merge_stderr.txt
            MERGE_EXIT=$?
            set -e
            echo "${MERGE_EXIT}" > reports/current/transition_bundle_merge_exit_code.txt
            if [ "${MERGE_EXIT}" -ne 0 ]; then
              echo "::warning::merge_outputs exited ${MERGE_EXIT}; continuing to package/ingest existing evidence where possible."
            fi
          fi

          if [ -f dist/bundles/proposed_transition_bundle.zip ] && [ ! -f receipts/current/transition_bundle_ingest_receipt.jsonl ]; then
            echo "- existing proposed_transition_bundle.zip found; attempting ingest before repackaging." >> "${GITHUB_STEP_SUMMARY}"
            set +e
            python scripts/ingest_transition_bundle.py dist/bundles/proposed_transition_bundle.zip --repo-root . > reports/current/transition_bundle_ingest_stdout.json 2> reports/current/transition_bundle_ingest_stderr.txt
            INGEST_EXIT=$?
            set -e
            echo "${INGEST_EXIT}" > reports/current/transition_bundle_ingest_exit_code.txt
          fi

          if [ ! -f receipts/current/transition_bundle_ingest_receipt.jsonl ]; then
            set +e
            python scripts/package_transition_bundle.py > reports/current/transition_bundle_package_stdout.json 2> reports/current/transition_bundle_package_stderr.txt
            PACKAGE_EXIT=$?
            set -e
            echo "${PACKAGE_EXIT}" > reports/current/transition_bundle_package_exit_code.txt
            if [ "${PACKAGE_EXIT}" -ne 0 ]; then
              echo "::warning::package_transition_bundle exited ${PACKAGE_EXIT}; attempting ingest from any existing bundle."
            fi

            if [ -f dist/bundles/proposed_transition_bundle.zip ]; then
              set +e
              python scripts/ingest_transition_bundle.py dist/bundles/proposed_transition_bundle.zip --repo-root . > reports/current/transition_bundle_ingest_stdout.json 2> reports/current/transition_bundle_ingest_stderr.txt
              INGEST_EXIT=$?
              set -e
              echo "${INGEST_EXIT}" > reports/current/transition_bundle_ingest_exit_code.txt
            else
              echo "- no proposed_transition_bundle.zip available after package attempt." >> "${GITHUB_STEP_SUMMARY}"
            fi
          fi

          if [ "${INGEST_EXIT}" -ne 0 ] && [ "${INGEST_EXIT}" -ne 99 ]; then
            echo "::warning::transition bundle ingest exited ${INGEST_EXIT}; receipt/diagnostics will still be committed."
          fi

          python scripts/check_transition_bundle_proof.py --repo-root .

          FINAL_STATUS="$(python3 -c "import json; print(json.load(open('reports/current/transition_bundle_proof_check.json'))['status'])")"
          FINAL_NEEDS_PROOF="$(python3 -c "import json; print(str(json.load(open('reports/current/transition_bundle_proof_check.json'))['needs_proof']).lower())")"
          echo "final_status=${FINAL_STATUS}" >> "${GITHUB_OUTPUT}"
          echo "final_needs_proof=${FINAL_NEEDS_PROOF}" >> "${GITHUB_OUTPUT}"

          {
            echo "- package_exit_code: ${PACKAGE_EXIT}"
            echo "- ingest_exit_code: ${INGEST_EXIT}"
            echo "- final_status: ${FINAL_STATUS}"
            echo "- final_needs_proof: ${FINAL_NEEDS_PROOF}"
            echo
            echo "### Final proof check report"
            echo
            echo '```json'
            cat reports/current/transition_bundle_proof_check.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Commit autonomous proof artifacts
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 Autonomous Tick"
          git config user.email "sv002-autonomous-tick@stegverse"
          git add -A \
            outputs/ \
            reports/current/ \
            receipts/current/ \
            agent_history/ \
            dist/bundles/ \
            dist/master-records/ \
            tracking/ \
            quarantine/ \
            failed_bundles/ \
            repair/ || true
          git add -f dist/bundles/ dist/master-records/ || true
          if git diff --staged --quiet; then
            echo "No autonomous proof changes to commit."
          else
            git commit -m "sv002: autonomous transition bundle proof artifacts"
            git push
          fi

      - name: Dispatch core-lite-intake fallback proof run
        if: ${{ failure() && steps.decide.outputs.needs_proof == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run core-lite-intake.yml \
            --ref main \
            --field agent_provider=both \
            --field dry_run=false \
            --field task_id= \
            --field input_type= \
            --field input_path= \
            --field kv_packet= \
            --field stage_override= \
            --field repair_target=

      - name: No-op when proof already exists
        if: ${{ steps.decide.outputs.needs_proof != 'true' }}
        run: |
          echo "v0.1.3 proof artifacts already exist. No dispatch needed."
