name: repo-recovery-finalize-one-candidate

"on":
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/repo-recovery-finalize-one-candidate.yml"
      - "tools/scripts/repo_recovery_finalize_one_candidate.py"
      - "reports/current/repo_recovery_destination_plan.json"
      - "reports/current/repo_recovery_finalize_check.json"
      - "receipts/current/transition_table_receipt.jsonl"
      - "receipts/current/cge_recovery_proof_regression_receipt.jsonl"
      - "receipts/current/repo_recovery_destination_plan_receipt.jsonl"
      - "receipts/current/repo_recovery_finalize_check_receipt.jsonl"

permissions:
  contents: write

jobs:
  propose-finalize-one-candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run non-executing M13 finalize-one candidate
        run: |
          set -euo pipefail
          python tools/scripts/repo_recovery_finalize_one_candidate.py --repo-root .

      - name: Commit finalize-one candidate evidence
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 M13 Finalize-One Candidate"
          git config user.email "sv002-m13-finalize-one-candidate@stegverse"
          git add -A reports/current/repo_recovery_finalize_one_candidate.json receipts/current/repo_recovery_finalize_one_candidate_receipt.jsonl || true
          if git diff --staged --quiet; then
            echo "No M13 finalize-one candidate evidence changes to commit."
          else
            git commit -m "sv002: record M13 finalize-one candidate proposal"
            git push
          fi

      - name: Upload finalize-one candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-recovery-finalize-one-candidate-evidence
          path: |
            reports/current/repo_recovery_finalize_one_candidate.json
            receipts/current/repo_recovery_finalize_one_candidate_receipt.jsonl
