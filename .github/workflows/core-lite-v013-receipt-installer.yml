name: core-lite-v013-receipt-installer

"on":
  workflow_dispatch:
  schedule:
    # Independent receipt installer cadence. GitHub schedule timing is approximate.
    - cron: "*/15 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/core-lite-v013-receipt-installer.yml"
      - "docs/V013_RECEIPT_INSTALL_TRIGGER.md"
      - "docs/V013_RECEIPT_INSTALL_DIAGNOSTIC.md"
      - "docs/V013_REQUIRED_RECEIPT_OUTPUTS.md"
      - "scripts/install_v013_activation_receipts.py"
      - "scripts/ingest_transition_bundle.py"
      - "scripts/check_transition_bundle_proof.py"
      - "scripts/evaluate_heartbeat_mode.py"
      - "scripts/check_scheduler_liveness.py"
      - "scripts/verify_repo_structure.py"
      - "config/heartbeat_policy.json"
      - "config/repo_structure_targets.json"
      - "dist/bundles/**"

permissions:
  contents: write

env:
  STEGVERSE_ENTITY: StegVerse-002
  STEGVERSE_REPO: StegVerse-002/core-lite
  STEGVERSE_VERSION: 0.1.3-gllm

jobs:
  install-v013-receipts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install v0.1.3 activation receipts
        run: |
          set +e
          python scripts/install_v013_activation_receipts.py
          INSTALL_EXIT=$?
          echo "INSTALL_EXIT=${INSTALL_EXIT}" >> "$GITHUB_ENV"
          set -e
          if [ "${INSTALL_EXIT}" -ne 0 ]; then
            echo "::warning::v0.1.3 receipt installer exited ${INSTALL_EXIT}; committing available receipts and diagnostics."
          fi

      - name: Commit v0.1.3 receipt evidence
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 Receipt Installer"
          git config user.email "sv002-receipt-installer@stegverse"
          git add -A \
            reports/current/ \
            receipts/current/ \
            dist/master-records/ \
            quarantine/ \
            failed_bundles/ \
            repair/ || true
          git add -f dist/master-records/ || true
          if git diff --staged --quiet; then
            echo "No v0.1.3 receipt evidence changes to commit."
          else
            git commit -m "sv002: install v013 activation receipts"
            git push
          fi

      - name: Report installer completion posture
        if: always()
        run: |
          if [ "${INSTALL_EXIT:-1}" -ne 0 ]; then
            echo "Installer completed with partial receipt evidence posture; see committed reports/current and receipts/current artifacts."
          else
            echo "Installer completed with full receipt evidence posture."
          fi
