name: repo-recovery-ingest-one-proof

"on":
  workflow_dispatch: {}

permissions:
  contents: write

env:
  STEGVERSE_ENTITY: StegVerse-002
  STAGE_REF: SV002-M11
  PROOF_BUNDLE: incoming/recovery/sv002_recovery_30d45378723de692_CHANGELOG.md.zip

jobs:
  ingest-one-recovery-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prove one-bundle recovery ingestion
        id: proof
        run: |
          set -euo pipefail
          mkdir -p reports/current receipts/current tracking/incoming_mailbox quarantine/incoming dist/run_artifacts
          : > reports/current/incoming_disposition_summary.jsonl
          : > receipts/current/incoming_disposition_receipt.jsonl
          : > reports/current/incoming_disposition_processed_files.txt

          INPUT_PATH="${PROOF_BUNDLE}"
          if [ ! -f "${INPUT_PATH}" ]; then
            echo "::notice::Proof bundle already absent: ${INPUT_PATH}"
            echo "already_absent=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          SHA="$(sha256sum "${INPUT_PATH}" | awk '{print $1}')"
          SHORT_SHA="$(printf "%s" "${SHA}" | cut -c1-16)"
          BASE="$(basename "${INPUT_PATH}")"
          EVENT_DIR="tracking/incoming_mailbox/${SHORT_SHA}"
          STAGED_PAYLOAD="${EVENT_DIR}/${BASE}"
          PIPELINE_LOG="${EVENT_DIR}/pipeline.log"
          mkdir -p "${EVENT_DIR}"
          cp "${INPUT_PATH}" "${STAGED_PAYLOAD}"

          STATUS="UNKNOWN"
          DISPOSITION="UNKNOWN"
          REASON=""

          set +e
          python -m core_lite.multimodal.pipeline \
            --repo-root . \
            --input-type bundle \
            --input-path "${STAGED_PAYLOAD}" \
            --entity "${STEGVERSE_ENTITY}" \
            --stage "${STAGE_REF}" > "${PIPELINE_LOG}" 2>&1
          EXIT_CODE=$?
          set -e

          if [ "${EXIT_CODE}" -eq 0 ]; then
            STATUS="EVALUATED"
            DISPOSITION="INSTALLED_OR_ACCEPTED"
            REASON="one-bundle recovery proof pipeline exited 0; recovery payload is eligible for removal from incoming/recovery"
          else
            STATUS="EVALUATED"
            DISPOSITION="QUARANTINED"
            REASON="one-bundle recovery proof pipeline exited ${EXIT_CODE}; payload copied to quarantine before removal from incoming/recovery"
            mkdir -p "quarantine/incoming/${SHORT_SHA}"
            cp "${STAGED_PAYLOAD}" "quarantine/incoming/${SHORT_SHA}/${BASE}"
          fi

          export INPUT_PATH STAGED_PAYLOAD SHA STATUS DISPOSITION REASON EXIT_CODE STAGE_REF
          RECORD="$(python3 -c "import os, json, datetime; print(json.dumps({'schema':'stegverse.recovery_ingest_one_disposition.v1','timestamp_utc':datetime.datetime.now(datetime.timezone.utc).isoformat(),'stage':os.environ.get('STAGE_REF',''),'source_path':os.environ['INPUT_PATH'],'staged_payload':os.environ['STAGED_PAYLOAD'],'sha256':os.environ['SHA'],'input_type':'bundle','status':os.environ['STATUS'],'disposition':os.environ['DISPOSITION'],'reason':os.environ['REASON'],'pipeline_exit_code':int(os.environ.get('EXIT_CODE','0') or '0'),'bulk_ingestion':False,'single_bundle_only':True,'original_deleted':False}, sort_keys=True))")"
          printf '%s\n' "${RECORD}" >> reports/current/incoming_disposition_summary.jsonl
          printf '%s\n' "${RECORD}" >> receipts/current/incoming_disposition_receipt.jsonl
          printf '%s\n' "${INPUT_PATH}" >> reports/current/incoming_disposition_processed_files.txt

          git rm -f --ignore-unmatch "${INPUT_PATH}" || rm -f "${INPUT_PATH}" || true

          {
            echo "## Repo Recovery One-Bundle Proof"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| bundle | ${INPUT_PATH} |"
            echo "| disposition | ${DISPOSITION} |"
            echo "| pipeline_exit_code | ${EXIT_CODE} |"
            echo "| bulk_ingestion | false |"
            echo "| original_deleted | false |"
            echo
            echo "### Disposition"
            cat reports/current/incoming_disposition_summary.jsonl
            echo
            echo "### Pipeline log tail"
            tail -n 80 "${PIPELINE_LOG}" || true
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Commit proof evidence and mailbox cleanup
        if: always()
        run: |
          set -euo pipefail
          git config user.name "StegVerse-002 Recovery Proof Router"
          git config user.email "sv002-recovery-proof-router@stegverse"
          git add -A incoming/ reports/current/ receipts/current/ tracking/ quarantine/ dist/ || true
          if git diff --staged --quiet; then
            echo "- No one-bundle recovery proof changes were staged." >> "${GITHUB_STEP_SUMMARY}"
          else
            git commit -m "sv002: prove one recovery bundle ingestion"
            git push
            echo "- One-bundle recovery proof evidence committed and pushed." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-recovery-ingest-one-proof-evidence
          path: |
            reports/current/incoming_disposition_summary.jsonl
            receipts/current/incoming_disposition_receipt.jsonl
            reports/current/incoming_disposition_processed_files.txt
            tracking/incoming_mailbox/**/pipeline.log
            quarantine/incoming/**
